services:
  db:
    image: postgres:15
    container_name: ynm_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    container_name: ynm_web
    restart: on-failure
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000 --timeout 150
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      RUN_MIGRATIONS: "true"
      SELENIUM_URL: "http://selenium:4444/wd/hub"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7
    container_name: ynm_redis
    restart: always
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
    container_name: ynm_celery
    command: celery -A core worker --loglevel=INFO
    restart: on-failure
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - RUN_MAIN=true
      - RUN_SCRAPER_ON_STARTUP=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SELENIUM_URL=http://selenium:4444/wd/hub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: .
    container_name: ynm_beat
    command: celery -A core beat --loglevel=INFO
    restart: on-failure
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - RUN_MAIN=true
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SELENIUM_URL=http://selenium:4444/wd/hub
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  selenium:
    image: selenium/standalone-chrome:latest
    container_name: ynm_selenium
    shm_size: 2gb
    ports:
      - "4444:4444"
      - "7900:7900"
    environment:
      - SE_EVENT_BUS_HOST=selenium
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443

volumes:
  postgres_data: