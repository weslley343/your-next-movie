services:
  web:
    build:
      context: .
    container_name: ynm_web
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: ynm_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: ynm_redis
    restart: always
    ports:
      - "6379:6379"

  celery:
    build:
      context: .
    container_name: ynm_celery
    command: celery -A core worker --loglevel=INFO
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  beat:
    build:
      context: .
    container_name: ynm_beat
    command: celery -A core beat --loglevel=INFO
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: